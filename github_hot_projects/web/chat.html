<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GitHub Hot Projects</title>
  <link rel="stylesheet" href="/web/chat.css?v=20260415-2128">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
</head>
<body>
  <nav class="mobile-tabs" id="mobile-tabs">
    <button type="button" class="active" data-tab="chat">💬 对话</button>
    <button type="button" data-tab="report">📊 报告</button>
  </nav>
  <main class="shell">
    <section class="chat-panel">
      <header class="hero">
        <h1>GitHub Hot Projects</h1>
        <p>手机端先对话下达指令，服务端调用 Agent 生成 Markdown 榜单，再把当前报告渲染成可阅读的网页返回给你。</p>
      </header>

      <section class="status-strip">
        <div class="stat-card">
          <span>连接状态</span>
          <strong id="transport-status">连接中</strong>
        </div>
        <div class="stat-card">
          <span>报告数量</span>
          <strong id="report-count">0</strong>
        </div>
      </section>

      <section class="messages" id="messages"></section>

      <footer class="composer">
        <div class="quick-actions">
          <button type="button" data-prompt="生成综合热榜">生成综合榜</button>
          <button type="button" data-prompt="生成新项目热榜">生成新项目榜</button>
          <button type="button" data-prompt="看看本周 GitHub Trending">GitHub Trending</button>
        </div>
        <div class="composer-row">
          <textarea id="composer-input" placeholder="例如：生成综合热榜 / 前50名 AI Agent 方向 / 增长>=500的新项目"></textarea>
          <button id="end-session-button" class="composer-secondary-button" type="button">重新开始</button>
        </div>
        <div class="session-actions">
          <button id="send-button" class="composer-primary-button" type="button">发送</button>
        </div>
      </footer>
    </section>

    <aside class="report-panel">
      <header class="report-head">
        <h2>报告列表</h2>
      </header>

      <div class="report-actions">
        <button id="refresh-reports" type="button">刷新报告列表</button>
        <button id="open-latest" type="button">打开最新报告</button>
      </div>

      <section class="report-list" id="report-list"></section>
    </aside>
  </main>

  <script>
    const SESSION_STORAGE_KEY = "gh-hot-session-id";
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("composer-input");
    const sendButton = document.getElementById("send-button");
    const endSessionButton = document.getElementById("end-session-button");
    const reportListEl = document.getElementById("report-list");
    const reportCountEl = document.getElementById("report-count");
    const transportStatusEl = document.getElementById("transport-status");
    const refreshReportsButton = document.getElementById("refresh-reports");
    const openLatestButton = document.getElementById("open-latest");

    let sessionId = getOrCreateSessionId();

    let socket = null;
    let socketReady = false;
    let latestReports = [];
    let wsReconnectTimer = null;
    let wsReconnectDelay = 1000; // 初始重连间隔 1s，指数退避最大 30s
    const WS_MAX_RECONNECT_DELAY = 30000;

    renderSessionIntro(false);

    setupComposer();
    setupQuickActions();
    setupReportActions();
    setupSessionActions();
    connectWebSocket();
    loadReports();

    function createSessionId() {
      return `mobile-${Math.random().toString(36).slice(2, 10)}`;
    }

    function getOrCreateSessionId() {
      const existing = localStorage.getItem(SESSION_STORAGE_KEY);
      if (existing) {
        return existing;
      }
      const sid = createSessionId();
      localStorage.setItem(SESSION_STORAGE_KEY, sid);
      return sid;
    }

    function updateSessionId(nextSessionId) {
      sessionId = nextSessionId;
      localStorage.setItem(SESSION_STORAGE_KEY, nextSessionId);
    }

    function renderSessionIntro(keepHistory, introText) {
      if (!keepHistory) {
        messagesEl.innerHTML = "";
      }
      addMessage("agent", introText || "欢迎，你可以点击快捷按钮生成综合榜、新项目榜、查看 Trending，也可以输入框自定义参数（如类别、数量、增长阈值等）。", {
        asHtml: false,
      });
    }

    function setupComposer() {
      inputEl.addEventListener("input", autoResize);
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
      sendButton.addEventListener("click", sendMessage);
    }

    function setupQuickActions() {
      document.querySelectorAll("[data-prompt]").forEach((button) => {
        button.addEventListener("click", () => {
          inputEl.value = button.dataset.prompt || "";
          autoResize();
          sendMessage();
        });
      });
    }

    function setupReportActions() {
      refreshReportsButton.addEventListener("click", loadReports);
      openLatestButton.addEventListener("click", () => {
        if (!latestReports.length) {
          addMessage("system", "当前还没有报告可打开，先生成一份日报。", { asHtml: false });
          return;
        }
        window.open(getReportHtmlUrl(latestReports[0].name), "_blank", "noopener");
      });
    }

    function setupSessionActions() {
      endSessionButton.addEventListener("click", endSession);
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = `${Math.min(inputEl.scrollHeight, 150)}px`;
    }

    function setSending(isSending) {
      sendButton.disabled = isSending;
      sendButton.textContent = isSending ? "发送中" : "发送";
    }

    function addMessage(role, text, options = {}) {
      const item = document.createElement("article");
      item.className = `message ${role}`;

      if (role !== "system") {
        const label = document.createElement("div");
        label.className = "label";
        label.textContent = role === "user" ? "You" : "Agent";
        item.appendChild(label);
      }

      const body = document.createElement("div");
      if (options.asHtml) {
        body.innerHTML = text;
      } else {
        body.textContent = text;
      }
      item.appendChild(body);
      messagesEl.appendChild(item);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return item;
    }

    function addTypingIndicator() {
      return addMessage("agent", "正在处理", { asHtml: false, typing: true });
    }

    function updateTypingIndicator(el, finalText) {
      const body = el.lastElementChild;
      body.className = "md-body";
      body.innerHTML = enhanceReply(finalText);
      body.classList.remove("typing");
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) {
        return;
      }

      addMessage("user", message, { asHtml: false });
      inputEl.value = "";
      autoResize();
      setSending(true);

      const pending = addMessage("agent", "正在处理", { asHtml: false });
      pending.querySelector("div:last-child").classList.add("typing");

      try {
        const reply = socketReady ? await sendViaWebSocket(message) : await sendViaHttp(message);
        updateTypingIndicator(pending, reply);
        await loadReports();
      } catch (error) {
        pending.remove();
        addMessage("system", `请求失败：${error.message}`, { asHtml: false });
      } finally {
        setSending(false);
      }
    }

    async function endSession() {
      const previousSessionId = sessionId;
      endSessionButton.disabled = true;
      closeSocket(false);
      transportStatusEl.textContent = "切换中";

      try {
        const response = await fetch(`/api/sessions/${encodeURIComponent(previousSessionId)}`, {
          method: "DELETE",
        });
        if (!response.ok && response.status !== 404) {
          throw new Error(`HTTP ${response.status}`);
        }
      } catch (error) {
        addMessage("system", `结束旧会话时出现提示：${error.message}` , { asHtml: false });
      }

      const nextSessionId = createSessionId();
      updateSessionId(nextSessionId);
      renderSessionIntro(false, "已经为你清空当前对话，你可以直接开始新的提问。\n\n生成完成后，下方会出现可点开的 HTML 报告入口。");
      connectWebSocket();
      setSending(false);
      endSessionButton.disabled = false;
      inputEl.focus();
    }

    function closeSocket(updateStatus) {F
      const currentSocket = socket;
      socket = null;
      socketReady = false;
      if (wsReconnectTimer) {
        clearTimeout(wsReconnectTimer);
        wsReconnectTimer = null;
      }
      if (updateStatus) {
        transportStatusEl.textContent = "普通模式";
      }
      if (currentSocket && (currentSocket.readyState === WebSocket.OPEN || currentSocket.readyState === WebSocket.CONNECTING)) {
        currentSocket.close(1000, "session-reset");
      }
    }

    function scheduleReconnect() {
      if (wsReconnectTimer) return;
      wsReconnectTimer = setTimeout(() => {
        wsReconnectTimer = null;
        connectWebSocket();
      }, wsReconnectDelay);
      wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_MAX_RECONNECT_DELAY);
    }

    function connectWebSocket() {
      if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
        return;
      }
      socket = null;
      socketReady = false;
      transportStatusEl.textContent = "连接中";
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const currentSessionId = sessionId;
      const url = `${protocol}//${window.location.host}/ws/chat/${encodeURIComponent(currentSessionId)}`;

      try {
        socket = new WebSocket(url);
      } catch (error) {
        socketReady = false;
        transportStatusEl.textContent = "普通模式";
        scheduleReconnect();
        return;
      }

      socket.addEventListener("open", () => {
        if (currentSessionId !== sessionId) {
          return;
        }
        socketReady = true;
        wsReconnectDelay = 1000; // 连接成功，重置退避
        transportStatusEl.textContent = "已连接";
      });

      socket.addEventListener("close", (event) => {
        if (currentSessionId !== sessionId) {
          return;
        }
        socketReady = false;
        transportStatusEl.textContent = "普通模式";
        // 非主动关闭时自动重连
        if (event.code !== 1000) {
          scheduleReconnect();
        }
      });

      socket.addEventListener("error", () => {
        if (currentSessionId !== sessionId) {
          return;
        }
        socketReady = false;
        transportStatusEl.textContent = "普通模式";
        scheduleReconnect();
      });
    }

    function sendViaWebSocket(message) {
      return new Promise((resolve, reject) => {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          sendViaHttp(message).then(resolve).catch(reject);
          return;
        }

        const handleMessage = (event) => {
          socket.removeEventListener("message", handleMessage);
          resolve(event.data);
        };

        socket.addEventListener("message", handleMessage, { once: true });
        socket.send(message);
      });
    }

    async function sendViaHttp(message) {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message }),
      });

      if (!response.ok) {
        let detail = `HTTP ${response.status}`;
        try {
          const errorPayload = await response.json();
          detail = errorPayload.detail || detail;
        } catch (error) {
          detail = `HTTP ${response.status}`;
        }
        throw new Error(detail);
      }

      const payload = await response.json();
      return payload.reply || "服务端未返回内容";
    }

    async function loadReports() {
      reportListEl.innerHTML = '<div class="empty">正在读取报告列表...</div>';

      try {
        const response = await fetch("/api/reports");
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const payload = await response.json();
        latestReports = Array.isArray(payload.reports) ? payload.reports : [];
        reportCountEl.textContent = String(latestReports.length);
        renderReports(latestReports);
      } catch (error) {
        reportListEl.innerHTML = `<div class="empty">读取报告失败：${escapeHtml(error.message)}</div>`;
      }
    }

    function renderReports(reports) {
      if (!reports.length) {
        reportListEl.innerHTML = '<div class="empty">当前还没有日报。你可以先在左侧发一条“生成今天综合热榜”看看效果。</div>';
        return;
      }

      reportListEl.innerHTML = reports.map((report, index) => {
        const label = index === 0 ? '<div class="report-chip">Latest</div>' : "";
        return `
          <a class="report-card" href="${getReportHtmlUrl(report.name)}" target="_blank" rel="noopener">
            ${label}
            <strong>${escapeHtml(report.name)}</strong>
            <div class="report-meta">
              <span>${formatSize(report.size)}</span>
              <span>HTML 渲染预览</span>
            </div>
          </a>
        `;
      }).join("");
    }

    function enhanceReply(text) {
      // 使用 marked 渲染 Markdown，DOMPurify 防 XSS
      if (typeof marked !== "undefined" && typeof DOMPurify !== "undefined") {
        const rawHtml = marked.parse(text);
        const safeHtml = DOMPurify.sanitize(rawHtml, {
          ADD_ATTR: ["target"],
          ALLOW_TAGS: [
            "h1","h2","h3","h4","h5","h6","p","br","hr","ul","ol","li",
            "strong","em","del","code","pre","blockquote","a","img",
            "table","thead","tbody","tr","th","td","div","span","sub","sup",
          ],
        });
        // 为 .md 文件名添加报告链接
        return safeHtml.replace(/([\w.-]+\.md)/g, (match) => {
          return `<a href="${getReportHtmlUrl(match)}" target="_blank" rel="noopener">${match}</a>`;
        });
      }
      // Fallback：无 marked/DOMPurify 时简单渲染
      const escaped = escapeHtml(text);
      const withReportLinks = escaped.replace(/([\w.-]+\.md)/g, (match) => {
        return `<a href="${getReportHtmlUrl(match)}" target="_blank" rel="noopener">${match}</a>`;
      });
      return withReportLinks.replace(/\n/g, "<br>");
    }

    function getReportHtmlUrl(name) {
      return `/api/reports/${encodeURIComponent(name)}/html`;
    }

    function formatSize(size) {
      if (!Number.isFinite(size)) {
        return "大小未知";
      }
      if (size < 1024) {
        return `${size} B`;
      }
      if (size < 1024 * 1024) {
        return `${(size / 1024).toFixed(1)} KB`;
      }
      return `${(size / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    // ── 手机端 Tab 切换 ──
    (function setupMobileTabs() {
      const tabsBar = document.getElementById("mobile-tabs");
      const chatPanel = document.querySelector(".chat-panel");
      const reportPanel = document.querySelector(".report-panel");
      if (!tabsBar || !chatPanel || !reportPanel) return;

      const buttons = tabsBar.querySelectorAll("button[data-tab]");
      const mobileQuery = window.matchMedia("(max-width: 640px)");

      function switchTab(target) {
        buttons.forEach(btn => btn.classList.toggle("active", btn.dataset.tab === target));
        if (target === "chat") {
          chatPanel.hidden = false;
          reportPanel.hidden = true;
        } else {
          chatPanel.hidden = true;
          reportPanel.hidden = false;
        }
      }

      buttons.forEach(btn => {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      });

      function syncTabLayout() {
        if (mobileQuery.matches) {
          const activeButton = tabsBar.querySelector("button.active") || buttons[0];
          switchTab(activeButton?.dataset.tab || "chat");
        } else {
          chatPanel.hidden = false;
          reportPanel.hidden = false;
        }
      }

      syncTabLayout();
      mobileQuery.addEventListener("change", syncTabLayout);

      // 生成报告后自动闪烁报告 Tab 提示用户
      const origLoadReports = loadReports;
      loadReports = async function() {
        const prevCount = latestReports.length;
        await origLoadReports.call(this);
        if (latestReports.length > prevCount && reportPanel.hidden) {
          const reportTab = tabsBar.querySelector('[data-tab="report"]');
          if (reportTab && !reportTab.classList.contains("active")) {
            reportTab.style.color = "var(--accent)";
            setTimeout(() => { reportTab.style.color = ""; }, 2000);
          }
        }
      };
    })();
  </script>
</body>
</html>
